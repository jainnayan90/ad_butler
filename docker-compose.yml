# Development stack — hot-reload, source-mounted, no release build required.
#
# Usage:
#   docker compose up           # start everything
#   docker compose up app       # start only the app (assumes db/rabbitmq already running)
#   docker compose run app mix test   # run tests inside the container
#   docker compose down -v      # stop and remove volumes

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ad_butler_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672" # management UI — http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - .:/app              # source mount for live reload
      - build_cache:/app/_build
      - deps_cache:/app/deps
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ad_butler_dev
      RABBITMQ_URL: amqp://guest:guest@rabbitmq
      PHX_BIND: "0.0.0.0"
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_OAUTH_CALLBACK_URL: ${META_OAUTH_CALLBACK_URL:-http://localhost:4000/auth/meta/callback}
      CLOAK_KEY_DEV: ${CLOAK_KEY_DEV}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  build_cache:
  deps_cache:
